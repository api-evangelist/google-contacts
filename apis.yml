apis:
  - name: Google People API v1
    description: >-
      The Google People API provides programmatic access to contacts and profile information. Manage contacts, contact
      groups, and access directory data for Google Workspace users.
    humanURL: https://developers.google.com/people
    baseURL: https://people.googleapis.com/v1
    properties:
