aid: google-contacts
name: Google People API
description: >-
  The Google People API provides access to information about profiles and contacts. It allows you to list, create,
  update, delete, and search contacts, as well as manage contact groups. It replaces the legacy Google Contacts API and
  provides access to user profiles and directory information.
