name: Google People API (Contacts)
description: >-
  The Google People API provides access to information about profiles and
  contacts. It allows you to list, create, update, delete, and search contacts,
  as well as manage contact groups. It replaces the legacy Google Contacts API
  and provides access to user profiles and directory information.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/google-contacts/refs/heads/main/apis.yml
created: '2026-03-13'
modified: '2026-03-13'
specificationVersion: '0.18'
tags:
  - Contacts
