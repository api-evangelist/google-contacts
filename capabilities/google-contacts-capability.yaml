    - name: createcontact
      description: Create a contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-contacts.createcontact
      with:
        personFields: tools.personFields
      inputParameters:
      - name: personFields
        type: string
        description: personFields
      outputParameters:
      - type: object
        mapping: $.
    - name: updatecontact
      description: Update a contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-contacts.updatecontact
      with:
        resourceName: tools.resourceName
        updatePersonFields: tools.updatePersonFields
        personFields: tools.personFields
      inputParameters:
      - name: resourceName
        type: string
        description: resourceName
        required: true
      - name: updatePersonFields
        type: string
        description: updatePersonFields
      - name: personFields
        type: string
        description: personFields
      outputParameters:
      - type: object
